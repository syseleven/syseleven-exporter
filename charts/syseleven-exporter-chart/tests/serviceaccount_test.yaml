# tests/serviceaccount_test.yaml

suite: Test ServiceAccount
templates:
  - templates/serviceaccount.yaml
set:
  openstack:
    username: "test-user"
    password: "test-password"

tests:
  - it: should create ServiceAccount when create is true (default)
    asserts:
      - isKind:
          of: ServiceAccount
      - isAPIVersion:
          of: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-syseleven-exporter
      - matchRegex:
          path: metadata.namespace
          pattern: ^[A-Z]+$

  - it: should not create ServiceAccount when create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ServiceAccount with custom name
    set:
      serviceAccount:
        create: true
        name: "custom-service-account"
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: custom-service-account

  - it: should create ServiceAccount with custom annotations
    set:
      serviceAccount:
        create: true
        annotations:
          my-annotation.example.com/test-arn: "test-annotation-value"
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.annotations["my-annotation.example.com/test-arn"]
          value: "test-annotation-value"

  - it: should create ServiceAccount with custom labels
    set:
      serviceAccount:
        create: true
        labels:
          app.kubernetes.io/component: exporter
          custom-label: custom-value
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.labels["custom-label"]
          value: custom-value
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: exporter

  - it: should create ServiceAccount with both annotations and labels
    set:
      serviceAccount:
        create: true
        name: "custom-sa"
        annotations:
          my-annotation: "my-value"
        labels:
          my-label: "my-label-value"
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: custom-sa
      - equal:
          path: metadata.annotations["my-annotation"]
          value: my-value
      - equal:
          path: metadata.labels["my-label"]
          value: my-label-value
      - matchRegex:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          pattern: ^Helm$
